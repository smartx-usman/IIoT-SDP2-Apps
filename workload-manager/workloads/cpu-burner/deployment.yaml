apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cpu-burner-ss
  labels:
    environment: production
    app: cpu-burner-deployment
spec:
  #replicas: 1
  selector:
    matchLabels:
      app: cpu-burner-deployment
  template:
    metadata:
      labels:
        app: cpu-burner-deployment
    spec:
      containers:
      - name: cpu-burner-container
        image: usman476/resource-burner:latest
        env:
        - name: WORKLOAD_TYPE
          value: "cpu-burner"
        command: ["python3"]
        args: ["burner.py"]
        imagePullPolicy: "Always"
        resources:
          requests:
            cpu: 1000m
            memory: 1024Mi
      restartPolicy: Always