apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: temp-actuator-deployment
  labels:
    environment: production
    app: temp-actuator-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temp-actuator-deployment
  template:
    metadata:
      labels:
        app: temp-actuator-deployment
    spec:
      containers:
      - name: temp-actuator-container
        image: usman476/mqtt-kafka-faust:latest
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: MQTT_BROKER
          value: "mqtt-broker-mosquitto"
        - name: MQTT_BROKER_PORT
          value: "1883"
        - name: MQTT_ACTUATOR_TOPIC
          value: "mqtt/temperature/actions"
        imagePullPolicy: "Always"
        command: ["python3"]
        args: ["actuator/temp-actuator.py"]
        resources:
          limits:
            cpu: 100m
            memory: 100Mi
          requests:
            cpu: 10m
            memory: 10Mi
      restartPolicy: Always
      #nodeSelector:
      #  kubernetes.io/hostname: worker2