<div id="registerUser" class="section" style="display: none;">
    <div class="right-upper-inner-div">
        <h4 style="color: white">Register New User</h4>
    </div>
    <div class="right-lower-inner-div">
        <form id="user-registration-form" method="POST" action="{{ url_for('auth.register') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="role">Role</label>
                <select class="form-control" id="role" name="role" required>
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <div class="form-group">
                <label for="level">Expertise Level</label>
                <select class="form-control" id="level" name="level" required>
                    <option value="beginner">Beginner</option>
                    <option value="intermediate">Intermediate</option>
                    <option value="advanced">Advanced</option>
                </select>
            </div>
            <div class="form-group">
                <label for="quota_pods">Maximum pods allowed</label>
                <input class="form-control" type="number" name="quota_pods" id="quota_pods"
                       value="4" min="1" max="20" placeholder="Maximum pods allowed">
            </div>
            <div class="form-group">
                <label for="quota_cpu">CPU limit</label>
                <input class="form-control" type="text" name="quota_cpu" id="quota_cpu"
                       value="1000m" pattern="^\d+m$"
                       placeholder="CPU limit (e.g., 500m, 2)">
            </div>
            <div class="form-group">
                <label for="quota_memory">Memory limit</label>
                <input class="form-control" type="text" name="quota_memory" id="quota_memory"
                       value="2Gi" pattern="^\d+[MG]i$"
                       placeholder="Memory limit (e.g., 512Mi, 2Gi)">
            </div>

            <input type="submit" class="btn btn-primary" value="Register">
        </form>
    </div>
</div>
